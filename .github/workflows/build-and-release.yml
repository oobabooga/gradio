name: Build and Release Custom Gradio Manually

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository's code from the main branch
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Set up PNPM (Gradio's JS package manager)
      - name: Set up PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.1

      # Step 4: Install jq for JSON parsing
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Step 5: Install all dependencies (Python & JS)
      - name: Install Dependencies
        run: |
          pip install hatch
          bash scripts/install_gradio.sh

      # Step 6: Extract versions from package.json for release notes
      - name: Extract Versions
        id: extract-versions
        run: |
          GRADIO_VERSION=$(jq -r .version gradio/package.json)
          echo "GRADIO_VERSION=$GRADIO_VERSION" >> $GITHUB_ENV
          CLIENT_VERSION=$(jq -r .version client/python/gradio_client/package.json)
          echo "CLIENT_VERSION=$CLIENT_VERSION" >> $GITHUB_ENV

      # Step 7: Build the frontend
      - name: Build Frontend
        run: bash scripts/build_frontend.sh

      # Step 8: Build gradio_client wheel
      - name: Build Gradio Client Wheel
        run: |
          cd client/python
          hatch build
          cd ../..

      # Step 9: Build the main Gradio Python wheels
      - name: Build Gradio Wheels
        run: hatch build

      # Step 10: Create or update the GitHub Release
      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: custom-build
        run: |
          # Create the release if it doesn't exist (ignore error if it does)
          gh release create $TAG_NAME \
            --title "Custom Gradio Build (Latest)" \
            --notes "Latest custom build. Current versions: Gradio ${{ env.GRADIO_VERSION }}, Client ${{ env.CLIENT_VERSION }}" \
            || echo "Release already exists, will update it."

      # Step 11: Upload wheels to the release (--clobber replaces existing files)
      - name: Upload Wheels to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: custom-build
        run: |
          gh release upload $TAG_NAME dist/*.whl --clobber
          gh release upload $TAG_NAME client/python/dist/*.whl --clobber
