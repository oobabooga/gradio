name: Build and Release Custom Gradio Manually

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Custom version suffix (e.g., 1, 2, etc.)'
        required: true
        default: '1'
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository's code from the main branch
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Set up PNPM (Gradio's JS package manager)
      - name: Set up PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.1

      # Step 4: Install all dependencies (Python & JS)
      - name: Install Dependencies
        run: |
          pip install hatch
          bash scripts/install_gradio.sh

      # Step 5: Build the frontend (A crucial step!)
      - name: Build Frontend
        run: bash scripts/build_frontend.sh

      # Step 6: Build gradio_client wheel
      - name: Build Gradio Client Wheel
        run: |
          cd client/python
          hatch build
          cd ../..

      # Step 7: Build the main Gradio Python wheels using Hatch
      - name: Build Gradio Wheels
        run: hatch build

      # Step 8: Create or update the GitHub Release
      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v4.37.2-custom.${{ inputs.version_suffix }}  # Dynamically builds the tag (e.g., v4.37.2-custom.2)
        run: |
          # Delete the release and the associated tag if they already exist
          gh release delete $TAG_NAME -y || echo "Release $TAG_NAME did not exist."
          git push origin --delete $TAG_NAME || echo "Tag $TAG_NAME did not exist on remote."

          # Create the tag locally and push it to the remote repository
          git tag $TAG_NAME
          git push origin $TAG_NAME

          # Create a new release associated with the new tag
          gh release create $TAG_NAME \
            --title "Custom Gradio Build (v4.37.2-custom.${{ inputs.version_suffix }})" \
            --notes "This release contains the latest wheels built manually from the main branch."

      # Step 9: Upload both gradio_client and gradio wheel files to the release
      - name: Upload Wheels to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v4.37.2-custom.${{ inputs.version_suffix }}
        run: |
          gh release upload $TAG_NAME dist/*.whl --clobber
          gh release upload $TAG_NAME client/python/dist/*.whl --clobber
