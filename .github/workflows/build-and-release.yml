name: Build and Release Custom Gradio Manually

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Custom version suffix (e.g., 1, 2, etc.)'
        required: true
        default: '1'
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository's code from the main branch
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Set up PNPM (Gradio's JS package manager)
      - name: Set up PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9.1

      # Step 4: Install jq for JSON parsing
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Step 5: Install all dependencies (Python & JS)
      - name: Install Dependencies
        run: |
          pip install hatch
          bash scripts/install_gradio.sh

      # Optional Step 6: Dynamically append custom suffix to versions in package.json (skippable if you commit customs to main)
      - name: Set Custom Versions
        run: |
          for file in gradio/package.json client/python/gradio_client/package.json; do
            if [ -f "$file" ]; then
              jq '.version = (.version | sub("\\+.*$"; "") + "+custom.${{ inputs.version_suffix }}")' $file > temp.json && mv temp.json $file
            fi
          done

      # Step 7: Extract versions from package.json for tag and notes
      - name: Extract Versions
        id: extract-versions
        run: |
          GRADIO_VERSION=$(jq -r .version gradio/package.json)
          echo "GRADIO_VERSION=$GRADIO_VERSION" >> $GITHUB_ENV
          CLIENT_VERSION=$(jq -r .version client/python/gradio_client/package.json)
          echo "CLIENT_VERSION=$CLIENT_VERSION" >> $GITHUB_ENV

      # Step 8: Build the frontend (A crucial step!)
      - name: Build Frontend
        run: bash scripts/build_frontend.sh

      # Step 9: Build gradio_client wheel
      - name: Build Gradio Client Wheel
        run: |
          cd client/python
          hatch build
          cd ../..

      # Step 10: Build the main Gradio Python wheels using Hatch
      - name: Build Gradio Wheels
        run: hatch build

      # Step 11: Create or update the GitHub Release
      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v${{ env.GRADIO_VERSION }}  # Dynamic, based on Gradio's file version (e.g., v4.37.2+custom.1)
        run: |
          # Delete the release and the associated tag if they already exist
          gh release delete $TAG_NAME -y || echo "Release $TAG_NAME did not exist."
          git push origin --delete $TAG_NAME || echo "Tag $TAG_NAME did not exist on remote."

          # Create the tag locally and push it to the remote repository
          git tag $TAG_NAME
          git push origin $TAG_NAME

          # Create a new release associated with the new tag
          gh release create $TAG_NAME \
            --title "Custom Gradio Build (Gradio ${{ env.GRADIO_VERSION }}, Client ${{ env.CLIENT_VERSION }})" \
            --notes "This release contains the latest wheels built manually from the main branch."

      # Step 12: Upload both gradio_client and gradio wheel files to the release
      - name: Upload Wheels to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v${{ env.GRADIO_VERSION }}
        run: |
          gh release upload $TAG_NAME dist/*.whl --clobber
          gh release upload $TAG_NAME client/python/dist/*.whl --clobber
